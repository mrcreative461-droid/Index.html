<!DOCTYPE html>
<html>
<head>
  <title>Fridge Chef AI 🍳</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: Arial;
      text-align: center;
      background: #f0f0f0;
      padding: 20px;
    }
    button {
      padding: 12px;
      margin: 10px;
      border: none;
      background: green;
      color: white;
      border-radius: 8px;
    }
    video, img {
      width: 90%;
      max-width: 300px;
      border-radius: 10px;
    }
    .box {
      background: white;
      padding: 10px;
      margin-top: 15px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

<h2>🧊 Fridge Chef (Gemini AI)</h2>

<video id="camera" autoplay></video><br>
<button onclick="startCamera()">Start Camera 📸</button>
<button onclick="capture()">Capture</button>

<canvas id="canvas" style="display:none;"></canvas>
<img id="photo">

<br>
<button onclick="analyze()">Get Recipes 🍳</button>

<div class="box">
  <h3>Result:</h3>
  <pre id="output">Waiting...</pre>
</div>

<script>
let imageData = "";

async function startCamera() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { exact: "environment" }
      },
      audio: false
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    video.play();

  } catch (err) {
    alert("Back camera not found, switching...");
    
    // fallback to any camera
    const stream = await navigator.mediaDevices.getUserMedia({
      video: true
    });

    const video = document.getElementById("video");
    video.srcObject = stream;
    video.play();
  }
}

function capture() {
  const video = document.getElementById('camera');
  const canvas = document.getElementById('canvas');
  const ctx = canvas.getContext('2d');

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  imageData = canvas.toDataURL("image/jpeg").split(',')[1];
  document.getElementById('photo').src = canvas.toDataURL("image/jpeg");
}

async function analyze() {
  document.getElementById("output").innerText = "Analyzing...";

  const response = await fetch(
    "https://generativelanguage.googleapis.com/v1/models/gemini-pro-vision:generateContent?key=YOUR_API_KEY",
    {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        contents: [{
          parts: [
            {
              text: "Identify ingredients from this fridge image and suggest recipes"
            },
            {
              inline_data: {
                mime_type: "image/jpeg",
                data: imageData
              }
            }
          ]
        }]
      })
    }
  );

  const data = await response.json();

  document.getElementById("output").innerText =
    data.candidates?.[0]?.content?.parts?.[0]?.text || "No result";
}
</script>

</body>
</html>
